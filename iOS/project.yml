name: Vendorcredit
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Vendorcredit:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Vendorcredit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ioulog
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        DEVELOPMENT_TEAM: W7Q885Q59C
    info:
      path: Vendorcredit/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
  VendorcreditTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VendorcreditTests
    dependencies:
      - target: Vendorcredit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ioulog.tests
        DEVELOPMENT_TEAM: W7Q885Q59C
  VendorcreditUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VendorcreditUITests
    dependencies:
      - target: Vendorcredit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ioulog.uitests
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  Vendorcredit:
    build:
      targets:
        Vendorcredit: all
    test:
      targets:
        - VendorcreditTests
        - VendorcreditUITests
    run:
      config: Debug
